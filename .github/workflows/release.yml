name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build native messaging host
        working-directory: src-tauri
        run: cargo build --release --bin password-manager-native-host --target ${{ matrix.target }}

      - name: Rename native host with target triple (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/password-manager-native-host \
             src-tauri/target/${{ matrix.target }}/release/password-manager-native-host-${{ matrix.target }}

      - name: Rename native host with target triple (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          copy src-tauri\target\${{ matrix.target }}\release\password-manager-native-host.exe `
               src-tauri\target\${{ matrix.target }}\release\password-manager-native-host-${{ matrix.target }}.exe

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload native host (Unix)
        if: matrix.platform != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/password-manager-native-host-${{ matrix.target }}
          tag_name: ${{ github.ref_name }}

      - name: Upload native host (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/password-manager-native-host-${{ matrix.target }}.exe
          tag_name: ${{ github.ref_name }}
